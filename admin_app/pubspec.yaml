name: estrella_admin
description: App de administración para Estrella Delivery

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # Navigation
  go_router: ^14.3.0

  # QR Scanner
  mobile_scanner: ^5.2.3

  # QR Generator
  qr_flutter: ^4.1.0

  # Sharing
  share_plus: ^10.1.3

  # V3 Enterprise Features (Charts & Maps)
  fl_chart: ^0.69.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  google_maps_flutter: ^2.9.0

  # State Management
  flutter_riverpod: ^2.5.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  url_launcher: ^6.3.0

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  local_auth: ^2.1.8
  geolocator: ^13.0.1
  connectivity_plus: ^6.0.4
  pdf: ^3.11.1
  printing: ^5.12.0
  image_picker: ^1.1.2

  local_auth_android: any
  local_auth_darwin: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
