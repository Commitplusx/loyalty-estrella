<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏷️ Etiquetas de Colonias — Estrella</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f13;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1e1b4b, #312e81);
      padding: 20px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid #3730a3;
      position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; }
    header p  { font-size: 0.8rem; color: #a5b4fc; margin-top: 2px; }

    .stats {
      display: flex; gap: 16px; margin-left: auto;
      font-size: 0.78rem; color: #818cf8;
    }
    .stats span { background: #1e1b4b; border: 1px solid #3730a3; border-radius: 8px; padding: 4px 12px; }

    .toolbar {
      padding: 14px 28px;
      display: flex; gap: 12px; align-items: center;
      background: #16161e; border-bottom: 1px solid #1e1e2e;
    }
    .toolbar input {
      flex: 1; padding: 9px 14px;
      background: #1e1e2e; border: 1px solid #2d2d44;
      border-radius: 10px; color: #e2e8f0;
      font-size: 0.88rem;
      outline: none; transition: border-color .2s;
    }
    .toolbar input:focus { border-color: #6366f1; }
    .toolbar select {
      padding: 9px 12px;
      background: #1e1e2e; border: 1px solid #2d2d44;
      border-radius: 10px; color: #e2e8f0; font-size: 0.85rem;
      outline: none; cursor: pointer;
    }

    #lista {
      padding: 16px 28px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 12px;
    }

    .card {
      background: #16161e;
      border: 1px solid #1e1e2e;
      border-radius: 14px;
      padding: 14px 16px;
      transition: border-color .2s;
    }
    .card:hover { border-color: #3730a3; }
    .card.guardado { border-color: #22c55e; animation: flash .4s ease; }

    @keyframes flash {
      0%   { background: #14532d44; }
      100% { background: #16161e; }
    }

    .card-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 10px;
    }
    .nombre { font-weight: 600; font-size: 0.92rem; color: #e2e8f0; }
    .zona-badge {
      font-size: 0.7rem; padding: 2px 8px;
      border-radius: 99px; font-weight: 600; white-space: nowrap;
    }
    .zona-verde   { background:#14532d; color:#4ade80; }
    .zona-azul    { background:#1e3a5f; color:#60a5fa; }
    .zona-roja    { background:#450a0a; color:#f87171; }
    .zona-naranja { background:#431407; color:#fb923c; }
    .zona-default { background:#1e1e2e; color:#94a3b8; }

    .coords { font-size: 0.7rem; color: #475569; margin-bottom: 8px; }

    .tag-input-wrap { position: relative; }
    .tag-input {
      width: 100%; padding: 7px 40px 7px 10px;
      background: #0f0f13; border: 1px solid #2d2d44;
      border-radius: 8px; color: #c7d2fe;
      font-size: 0.82rem; outline: none;
      transition: border-color .2s;
    }
    .tag-input:focus { border-color: #6366f1; }
    .tag-input::placeholder { color: #374151; }

    .btn-save {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      background: #4f46e5; border: none; border-radius: 6px;
      color: white; padding: 3px 10px; font-size: 0.75rem;
      cursor: pointer; transition: background .15s;
    }
    .btn-save:hover { background: #6366f1; }
    .btn-save.saving { background: #374151; pointer-events: none; }
    .btn-save.ok { background: #16a34a; }

    .tag-hint { font-size: 0.68rem; color: #374151; margin-top: 4px; }

    .loading {
      grid-column: 1/-1; text-align: center;
      padding: 60px; color: #4f46e5; font-size: 1.1rem;
    }

    .empty { grid-column: 1/-1; text-align: center; padding: 40px; color: #374151; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f0f13; }
    ::-webkit-scrollbar-thumb { background: #2d2d44; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🏷️ Etiquetas de Colonias</h1>
    <p>Escribe alias separados por coma. El bot los busca primero antes que el fuzzy search.</p>
  </div>
  <div class="stats">
    <span id="stat-total">— colonias</span>
    <span id="stat-con">— con etiquetas</span>
  </div>
</header>

<div class="toolbar">
  <input type="search" id="buscar" placeholder="🔍 Buscar colonia...">
  <select id="filtro">
    <option value="todas">Todas</option>
    <option value="sin">Sin etiquetas</option>
    <option value="con">Con etiquetas</option>
  </select>
</div>

<div id="lista"><div class="loading">⏳ Cargando colonias...</div></div>

<script>
const SUPA_URL  = 'https://jdrrkpvodnqoljycixbg.supabase.co'
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkcnJrcHZvZG5xb2xqeWNpeGJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDkyOTEsImV4cCI6MjA5MDYyNTI5MX0.WEKqdL2p99cy8XvyqY31EP8-KbdOnhx2-fx9qz_iQtQ'

const H = { 'apikey': SUPA_ANON, 'Authorization': `Bearer ${SUPA_ANON}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' }

let colonias = []

async function cargar() {
  const res = await fetch(`${SUPA_URL}/rest/v1/colonias?select=id,nombre,lat,lng,etiquetas,etiqueta_zona&order=nombre.asc&limit=1000`, { headers: H })
  colonias = await res.json()
  actualizarStats()
  renderizar()
}

function actualizarStats() {
  document.getElementById('stat-total').textContent = `${colonias.length} colonias`
  const con = colonias.filter(c => c.etiquetas?.length).length
  document.getElementById('stat-con').textContent = `${con} con etiquetas`
}

function zonaClass(nombre) {
  if (!nombre) return 'zona-default'
  const n = nombre.toLowerCase()
  if (n.includes('verde'))   return 'zona-verde'
  if (n.includes('azul'))    return 'zona-azul'
  if (n.includes('roja') || n.includes('rojo')) return 'zona-roja'
  if (n.includes('naranja')) return 'zona-naranja'
  return 'zona-default'
}

function renderizar() {
  const q      = document.getElementById('buscar').value.toLowerCase()
  const filtro = document.getElementById('filtro').value

  let lista = colonias.filter(c => {
    if (q && !c.nombre?.toLowerCase().includes(q)) return false
    if (filtro === 'sin') return !c.etiquetas?.length
    if (filtro === 'con') return  c.etiquetas?.length
    return true
  })

  const cont = document.getElementById('lista')

  if (!lista.length) {
    cont.innerHTML = '<div class="empty">Sin resultados</div>'
    return
  }

  cont.innerHTML = lista.map(c => {
    const tags = (c.etiquetas || []).join(', ')
    const zona = c.etiqueta_zona || ''
    return `
    <div class="card" id="card-${c.id}">
      <div class="card-header">
        <span class="nombre">${c.nombre}</span>
        ${zona ? `<span class="zona-badge ${zonaClass(zona)}">${zona}</span>` : ''}
      </div>
      ${c.lat ? `<div class="coords">📍 ${c.lat?.toFixed(4)}, ${c.lng?.toFixed(4)}</div>` : ''}
      <div class="tag-input-wrap">
        <input class="tag-input" id="inp-${c.id}" type="text"
          value="${tags}"
          placeholder='ej: la pila, el centro, mercado viejo'
          onkeydown="if(event.key==='Enter') guardar('${c.id}', this.value)">
        <button class="btn-save" id="btn-${c.id}" onclick="guardar('${c.id}', document.getElementById('inp-${c.id}').value)">✓</button>
      </div>
      <div class="tag-hint">Separadas por coma · Enter para guardar</div>
    </div>`
  }).join('')
}

async function guardar(id, valor) {
  const btn = document.getElementById(`btn-${id}`)
  const card = document.getElementById(`card-${id}`)
  btn.textContent = '...'
  btn.className = 'btn-save saving'

  const tags = valor.split(',').map(t => t.trim().toLowerCase()).filter(Boolean)

  const res = await fetch(`${SUPA_URL}/rest/v1/colonias?id=eq.${id}`, {
    method: 'PATCH', headers: H,
    body: JSON.stringify({ etiquetas: tags })
  })

  if (res.ok) {
    btn.textContent = '✓'
    btn.className = 'btn-save ok'
    card.classList.add('guardado')
    // Actualizar cache local
    const c = colonias.find(x => x.id === id)
    if (c) c.etiquetas = tags
    actualizarStats()
    setTimeout(() => {
      btn.textContent = '✓'
      btn.className = 'btn-save'
      card.classList.remove('guardado')
    }, 1500)
  } else {
    btn.textContent = '✗'
    btn.className = 'btn-save'
    btn.style.background = '#dc2626'
    setTimeout(() => { btn.textContent = '✓'; btn.style.background = ''; }, 2000)
  }
}

document.getElementById('buscar').addEventListener('input', renderizar)
document.getElementById('filtro').addEventListener('change', renderizar)

cargar()
</script>
</body>
</html>
