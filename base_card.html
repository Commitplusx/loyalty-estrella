<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Base Card</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 1000px;
      height: 600px;
      background-color: #0b0d10;
      font-family: 'Outfit', sans-serif;
      color: #ffffff;
      position: relative;
      overflow: hidden;
    }

    /* Fondo abstracto / Textura suave */
    body::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(255,215,0,0.03) 0%, transparent 60%);
      z-index: 0;
    }

    /* Logo gigante en el fondo (Estrella de agua) */
    .bg-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      opacity: 0.02;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Encabezado */
    .header {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-img {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      background: #000;
      padding: 8px;
      border: 2px solid rgba(255,215,0,0.3);
    }

    .brand {
      display: flex;
      flex-direction: column;
    }

    .brand h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: 4px;
      background: linear-gradient(90deg, #FFDF00, #D4AF37, #FFDF00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
      line-height: 1;
    }

    .vip-tag {
      color: #FFD700;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 2px;
      margin-top: 5px;
    }

    /* Labels que sí van fijos en la imagen */
    .label {
      font-size: 1rem;
      color: #8892b0;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .cliente-label {
      position: absolute;
      top: 310px;
      left: 60px;
    }

    .puntos-label {
      position: absolute;
      top: 450px;
      left: 60px;
    }

    .billetera-label {
      position: absolute;
      top: 450px;
      left: 240px;
    }

    /* Caja para el QR Code */
    .qr-box {
      position: absolute;
      top: 240px; /* Centrado verticalmente */
      right: 60px;
      width: 220px;
      height: 220px;
      background-color: white;
      border-radius: 32px;
      border: 4px solid rgba(255,215,0,0.5);
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Etiqueta debajo del QR */
    .qr-footer-text {
      position: absolute;
      top: 480px;
      right: 60px;
      width: 220px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 800;
      color: #FFD700;
      letter-spacing: 4px;
    }

  </style>
</head>
<body>

  <!-- Puedes poner el logo de Estrella aquí si tienes la URL -->
  <img src="https://jdrrkpvodnqoljycixbg.supabase.co/storage/v1/object/public/public-assets/logo.png" class="bg-logo" alt="" onerror="this.style.display='none'">

  <div class="container">
    <div class="header">
      <img src="https://jdrrkpvodnqoljycixbg.supabase.co/storage/v1/object/public/public-assets/logo.png" class="logo-img" alt="Logo" onerror="this.style.display='none'">
      <div class="brand">
        <h1>ESTRELLA</h1>
      </div>
    </div>

    <!-- Las coordenadas de los textos dinámicos en Cloudinary deben ajustarse a estas posiciones -->
    <div class="label cliente-label">NOMBRE DEL CLIENTE</div>
    
    <div class="label puntos-label">PUNTOS</div>
    <div class="label billetera-label">BILLETERA</div>

    <!-- Caja donde irá el QR -->
    <div class="qr-box">
      <!-- El interior es blanco, Cloudinary dibujará el QR encima de esta caja -->
    </div>
    
  </div>

</body>
</html>
